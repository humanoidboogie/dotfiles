[general]
import = [
  "~/.config/alacritty/dank-theme.toml",
  "~/.config/alacritty/font-size.toml"
]

[window]
decorations = "None"
padding = { x = 12, y = 12 }
opacity = 0.8

[font]
normal      = { family = "FiraCode Nerd Font Mono Ret" }
bold        = { family = "FiraCode Nerd Font Mono Ret" }
italic      = { family = "FiraCode Nerd Font Mono Ret" }
bold_italic = { family = "FiraCode Nerd Font Mono Ret" }

[scrolling]
history = 3023

[cursor]
style = { shape = "Block", blinking = "On" }
blink_interval = 500
unfocused_hollow = true

[mouse]
hide_when_typing = true

[selection]
save_to_clipboard = false

[bell]
duration = 0

[keyboard]
bindings = [
  { key = "C",       mods = "Control|Shift", action = "Copy"  },
  { key = "V",       mods = "Control|Shift", action = "Paste" },
  { key = "N",       mods = "Control|Shift", action = "SpawnNewInstance" },
  { key = "Equals",  mods = "Control|Shift", action = "IncreaseFontSize" },
  { key = "Minus",   mods = "Control",       action = "DecreaseFontSize" },
  { key = "Key0",    mods = "Control",       action = "ResetFontSize"    },
  { key = "Enter",   mods = "Shift",         chars = "\n" },
]
